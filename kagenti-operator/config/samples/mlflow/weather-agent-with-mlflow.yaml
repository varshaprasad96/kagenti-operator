# Weather Agent with MLflow Integration
# This agent demonstrates MLflow tracking for:
# - LLM call latency metrics
# - Token usage statistics  
# - Agent task completion rates
# - Model performance tracking
apiVersion: agent.kagenti.dev/v1alpha1
kind: Agent
metadata:
  name: weather-agent-mlflow
  namespace: kagenti
  labels:
    app.kubernetes.io/name: weather-agent-mlflow
    kagenti.io/agent-protocol: a2a
    kagenti.io/type: agent
    kagenti.io/observability: mlflow
  annotations:
    description: "Weather agent with MLflow integration for tracking stats"
spec:
  description: "Weather agent with integrated MLflow experiment tracking"
  replicas: 1

  imageSource:
    image: ghcr.io/kagenti/agent-examples/weather_service:v0.0.1-alpha.2

  servicePorts:
    - name: http
      port: 8000
      protocol: TCP
      targetPort: 8000
    - name: metrics
      port: 9090
      protocol: TCP
      targetPort: 9090

  podTemplateSpec:
    spec:
      containers:
        - name: agent
          image: ghcr.io/kagenti/agent-examples/weather_service:v0.0.1-alpha.2
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
              name: http
              protocol: TCP
            - containerPort: 9090
              name: metrics
              protocol: TCP
          env:
            # Application config
            - name: PORT
              value: "8000"
            - name: HOST
              value: "0.0.0.0"
            
            # MLflow configuration - key integration point
            - name: MLFLOW_TRACKING_URI
              value: "http://mlflow-tracking.mlflow.svc.cluster.local:5000"
            - name: MLFLOW_EXPERIMENT_NAME
              value: "kagenti-weather-agent"
            - name: MLFLOW_ENABLE_SYSTEM_METRICS_LOGGING
              value: "true"
            
            # OpenTelemetry for tracing (complements MLflow for detailed spans)
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://otel-collector.kagenti-system.svc.cluster.local:8335"
            - name: OTEL_SERVICE_NAME
              value: "weather-agent-mlflow"
            
            # LLM configuration
            - name: LLM_API_BASE
              value: "http://host.docker.internal:11434/v1"
            - name: LLM_API_KEY
              value: "dummy"
            - name: LLM_MODEL
              value: "llama3.2:3b-instruct-fp16"
            
            # MCP tool connection
            - name: MCP_URL
              value: "http://mcp-weather-tool-proxy:8000/mcp"
            
            # Auth config
            - name: KEYCLOAK_URL
              value: "http://keycloak.keycloak.svc.cluster.local:8080"
            - name: CLIENT_NAME
              value: "kagenti/weather-service-mlflow"
            - name: CLIENT_ID
              value: "spiffe://localtest.me/sa/weather-service-mlflow"
            - name: NAMESPACE
              value: "kagenti"
            
            # Cache config
            - name: UV_CACHE_DIR
              value: "/app/.cache/uv"
          
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          
          volumeMounts:
            - name: cache
              mountPath: /app/.cache
            - name: marvin
              mountPath: /.marvin
            - name: shared-data
              mountPath: /shared
      
      volumes:
        - name: cache
          emptyDir: {}
        - name: marvin
          emptyDir: {}
        - name: shared-data
          emptyDir: {}
