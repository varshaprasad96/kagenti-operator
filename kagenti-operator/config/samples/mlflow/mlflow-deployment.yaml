---
# MLflow Tracking Server Deployment for Kagenti Agent Platform
# This deployment provides experiment tracking, model versioning, and metrics logging
apiVersion: v1
kind: Namespace
metadata:
  name: mlflow
  labels:
    app.kubernetes.io/name: mlflow
    kagenti.io/component: observability
---
# Persistent storage for MLflow artifacts and SQLite database
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mlflow-data
  namespace: mlflow
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
# MLflow Tracking Server Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mlflow-tracking
  namespace: mlflow
  labels:
    app: mlflow-tracking
    app.kubernetes.io/name: mlflow
    app.kubernetes.io/component: tracking-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mlflow-tracking
  template:
    metadata:
      labels:
        app: mlflow-tracking
        app.kubernetes.io/name: mlflow
    spec:
      containers:
        - name: mlflow
          image: ghcr.io/mlflow/mlflow:v2.19.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5000
              name: http
              protocol: TCP
          command:
            - mlflow
            - server
            - --host=0.0.0.0
            - --port=5000
            - --backend-store-uri=sqlite:///mlflow/mlflow.db
            - --default-artifact-root=/mlflow/artifacts
            - --serve-artifacts
          volumeMounts:
            - name: mlflow-data
              mountPath: /mlflow
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: mlflow-data
          persistentVolumeClaim:
            claimName: mlflow-data
---
# MLflow Service
apiVersion: v1
kind: Service
metadata:
  name: mlflow-tracking
  namespace: mlflow
  labels:
    app: mlflow-tracking
    app.kubernetes.io/name: mlflow
spec:
  type: ClusterIP
  ports:
    - port: 5000
      targetPort: 5000
      protocol: TCP
      name: http
  selector:
    app: mlflow-tracking
---
# NodePort service for local access (optional - for Kind cluster access)
apiVersion: v1
kind: Service
metadata:
  name: mlflow-tracking-np
  namespace: mlflow
  labels:
    app: mlflow-tracking
spec:
  type: NodePort
  ports:
    - port: 5000
      targetPort: 5000
      protocol: TCP
      name: http
      nodePort: 30500
  selector:
    app: mlflow-tracking
