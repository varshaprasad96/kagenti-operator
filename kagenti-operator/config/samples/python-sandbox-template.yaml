# SandboxTemplate for Python code execution
# This template defines the runtime environment for sandboxes used by Kagenti agents
apiVersion: extensions.agents.x-k8s.io/v1alpha1
kind: SandboxTemplate
metadata:
  name: python-sandbox-template
  namespace: kagenti
spec:
  # podTemplate defines the pod specification for sandboxes created from this template
  podTemplate:
    spec:
      # Restart policy: Always - keep sandbox running to accept commands
      restartPolicy: Always
      containers:
      - name: sandbox
        image: python:3.11-slim
        imagePullPolicy: IfNotPresent
        # Keep container running - agent-sandbox will execute commands via API
        command: ["/bin/sh", "-c", "while true; do sleep 3600; done"]
        resources:
          requests:
            memory: "128Mi"
            cpu: "50m"
          limits:
            memory: "256Mi"
            cpu: "200m"
        # Security context
        securityContext:
          runAsUser: 1000  # Use specific user ID instead of runAsNonRoot
          runAsGroup: 1000
          allowPrivilegeEscalation: false
          capabilities:
            drop:
              - ALL
          readOnlyRootFilesystem: false  # Allow writing to filesystem for code execution
        # Environment variables
        env:
        - name: PYTHONUNBUFFERED
          value: "1"
        # Working directory
        workingDir: /workspace
        # Volume mounts for workspace
        volumeMounts:
        - name: workspace
          mountPath: /workspace
      # Pod-level security context
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      # Volumes
      volumes:
      - name: workspace
        emptyDir: {}
