# Sandbox Router Deployment
# Routes requests from agents to sandbox pods
# See: https://github.com/kubernetes-sigs/agent-sandbox/tree/main/clients/python/agentic-sandbox-client/sandbox-router
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sandbox-router
  namespace: kagenti
  labels:
    app: sandbox-router
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sandbox-router
  template:
    metadata:
      labels:
        app: sandbox-router
    spec:
      containers:
      - name: router
        # Replace with your built sandbox-router image
        # To build: See sandbox-router/README.md in agent-sandbox repo
        image: sandbox-router:latest  # TODO: Replace with actual image
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
          name: http
        env:
        - name: PORT
          value: "8080"
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: sandbox-router-svc
  namespace: kagenti
  labels:
    app: sandbox-router
spec:
  type: ClusterIP
  ports:
  - port: 8080
    targetPort: 8080
    protocol: TCP
    name: http
  selector:
    app: sandbox-router
