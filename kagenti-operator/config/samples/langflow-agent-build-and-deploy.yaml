apiVersion: agent.kagenti.dev/v1alpha1
kind: AgentBuild
metadata:
  name: langflow-agent-build
  namespace: kagenti
spec:
  mode: dev
  source:
    sourceRepository: "github.com/your-org/your-langflow-agent-repo.git"
    sourceRevision: "main"
    sourceSubfolder: "langflow-agent"
    sourceCredentials:
      name: github-token-secret

  pipeline:
    namespace: kagenti-system
    parameters:
    - name: SOURCE_REPO_SECRET
      value: github-token-secret
    - name: START_COMMAND
      value: "bash start.sh"
    - name: PYTHON_VERSION
      value: "3.11"

  buildOutput:
    image: "langflow-agent"
    imageTag: "v0.1.0"
    imageRegistry: "registry.cr-system.svc.cluster.local:5000"
    imageRepoCredentials:
      name: ghcr-secret

---
apiVersion: agent.kagenti.dev/v1alpha1
kind: Agent
metadata:
  name: langflow-agent
  namespace: kagenti
  labels:
    app.kubernetes.io/name: langflow-agent
    kagenti.io/type: agent
spec:
  description: "Langflow agent running flow.json"

  replicas: 1

  imageSource:
    buildRef:
      name: langflow-agent-build

  servicePorts:
    - name: http
      port: 7860
      protocol: TCP
      targetPort: 7860

  podTemplateSpec:
    spec:
      containers:
      - name: agent # use fixed name "agent" for the main container
        image: <will be replaced with imageSource.image above>
        imagePullPolicy: IfNotPresent
        env:
        - name: PORT
          value: "7860"
        - name: HOST
          value: 0.0.0.0
        ports:
        - name: http
          containerPort: 7860
          protocol: TCP
