{{- if .Values.webhook.enable }}
apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  name: {{ include "chart.fullname" . }}-mutating-webhook-configuration
  labels:
    {{- include "chart.labels" . | nindent 4 }}
  {{- if .Values.certmanager.enable }}
  annotations:
    cert-manager.io/inject-ca-from: {{ .Release.Namespace }}/serving-cert-{{ .Release.Name }}
  {{- end }}
webhooks:
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: {{ include "chart.fullname" . }}-webhook-service
      namespace: {{ .Release.Namespace }}
      path: /mutate-workloads-authbridge
      port: 443
  failurePolicy: Fail
  name: inject.kagenti.io
  namespaceSelector:
    matchLabels:
      kagenti-enabled: "true"
  reinvocationPolicy: IfNeeded
  rules:
  - apiGroups:
    - ""
    apiVersions:
    - v1
    operations:
    - CREATE
    resources:
    - pods
  sideEffects: None
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: {{ include "chart.fullname" . }}-validating-webhook-configuration
  labels:
    {{- include "chart.labels" . | nindent 4 }}
  {{- if .Values.certmanager.enable }}
  annotations:
    cert-manager.io/inject-ca-from: {{ .Release.Namespace }}/serving-cert-{{ .Release.Name }}
  {{- end }}
webhooks:
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: {{ include "chart.fullname" . }}-webhook-service
      namespace: {{ .Release.Namespace }}
      path: /validate-agent-kagenti-dev-v1alpha1-agentcard
      port: 443
  failurePolicy: Fail
  name: vagentcard.kb.io
  rules:
  - apiGroups:
    - agent.kagenti.dev
    apiVersions:
    - v1alpha1
    operations:
    - CREATE
    - UPDATE
    resources:
    - agentcards
  sideEffects: None
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "chart.fullname" . }}-webhook-service
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "chart.labels" . | nindent 4 }}
spec:
  ports:
  - port: 443
    protocol: TCP
    targetPort: webhook-server
  selector:
    {{- include "chart.selectorLabels" . | nindent 4 }}
    control-plane: controller-manager
{{- end }}
