name: goreleaser

on:
  push:
    tags:
    - 'v*'
    # Trigger on PR merges to main
    branches:
    - main
  # Allow manual trigger
  workflow_dispatch:

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  REPO: kagenti/kagenti-operator
  CHARTS_PATH: ./charts

jobs:
  # Build and push images for non-tag events (PR merges to main, workflow_dispatch)
  build-image:
    if: github.ref_type != 'tag'
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4

    - name: Log in to ghcr.io
      uses: docker/login-action@v4
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract Docker metadata
      id: meta
      uses: docker/metadata-action@v6
      with:
        images: ghcr.io/${{ github.repository }}/kagenti-operator
        tags: |
          type=sha,prefix={{branch}}-
          type=raw,value=latest

    - name: Build and push kagenti-operator
      uses: docker/build-push-action@v7
      with:
        context: ./kagenti-operator
        file: ./kagenti-operator/Dockerfile
        push: true
        platforms: linux/amd64,linux/arm64
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}

    - name: Extract Docker metadata (agentcard-signer)
      id: signer-meta
      uses: docker/metadata-action@v6
      with:
        images: ghcr.io/${{ github.repository }}/agentcard-signer
        tags: |
          type=sha,prefix={{branch}}-
          type=raw,value=latest

    - name: Build and push agentcard-signer
      uses: docker/build-push-action@v7
      with:
        context: ./kagenti-operator
        file: ./kagenti-operator/cmd/agentcard-signer/Dockerfile
        push: true
        platforms: linux/amd64,linux/arm64
        tags: ${{ steps.signer-meta.outputs.tags }}
        labels: ${{ steps.signer-meta.outputs.labels }}

  # Full release with GoReleaser (only on version tags)
  goreleaser:
    if: github.ref_type == 'tag' && startsWith(github.ref_name, 'v')
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - uses: actions/setup-go@v6
      with:
        go-version: '1.24'

    - name: Delete non-semver tags
      run: 'git tag -d $(git tag -l | grep -v "^v")'

    - name: Run GoReleaser on tag
      uses: goreleaser/goreleaser-action@v7
      with:
        distribution: goreleaser
        version: latest
        args: release --timeout 60m --clean
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        USER: ${{ github.actor }}
        EMAIL: ${{ github.actor}}@users.noreply.github.com

    - name: Set up Helm
      uses: azure/setup-helm@v4
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Login to registry
      uses: docker/login-action@v4
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    - name: Package and push kagenti operator chart
      run: |
        chartVersion=$(echo ${{ github.ref_name }} | cut -c 2-)
        chartPackageName="kagenti-operator-chart-${chartVersion}.tgz"
        cd ${{ env.CHARTS_PATH }}/kagenti-operator
        sed -i "s/__PLACEHOLDER__/${chartVersion}/g" values.yaml
        helm package . --destination . --version ${chartVersion} --app-version ${chartVersion}
        helm push "./${chartPackageName}" oci://${{ env.REGISTRY }}/${{ env.REPO }}
